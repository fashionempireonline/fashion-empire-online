<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Empire</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Optional favicon -->
    <link rel="icon" href="images/favicon.ico">
</head>

<body>

    <!-- HEADER -->
    <header>
        <div class="navbar">

            <div class="logo">
                FASHION EMPIRE
            </div>

            <div class="search-box">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search products..."
                    onkeyup="searchProducts()"
                >
            </div>

            <div class="nav-icons">
                <i class="fa-solid fa-heart"></i>

                <i
                    class="fa-solid fa-cart-shopping"
                    onclick="openCart()"
                ></i>

                <a href="login.html">
                    <i class="fa-solid fa-user"></i>
                </a>
            </div>

        </div>
    </header>


    <!-- HERO SECTION -->
    <section class="hero">
        <h1>Luxury Fashion Collection</h1>

        <p>
            Best Fashion Store For Clothes & Accessories
        </p>

        <button onclick="filterCategory('all')">
            Shop Now
        </button>
    </section>


    <!-- CATEGORY SECTION -->
    <section class="categories">

        <h2 class="section-title">
            Categories
        </h2>

        <div class="category-list">

            <div
                class="category"
                onclick="filterCategory('all')"
            >
                <div class="circle">All</div>
                <p>All</p>
            </div>

            <div
                class="category"
                onclick="filterCategory('menswear')"
            >
                <div class="circle">Menswear</div>
                <p>Menswear</p>
            </div>

            <div
                class="category"
                onclick="filterCategory('womenwear')"
            >
                <div class="circle">Womenwear</div>
                <p>Womenwear</p>
            </div>

            <div
                class="category"
                onclick="filterCategory('shoes')"
            >
                <div class="circle">Shoes</div>
                <p>Shoes</p>
            </div>

            <div
                class="category"
                onclick="filterCategory('bags')"
            >
                <div class="circle">Bags</div>
                <p>Bags</p>
            </div>

            <div
                class="category"
                onclick="filterCategory('watches')"
            >
                <div class="circle">Watches</div>
                <p>Watches</p>
            </div>

        </div>
    </section>


    <!-- PRODUCTS SECTION -->
    <section
        class="products"
        id="products"
    >
        <!-- Firebase se products auto load honge -->
    </section>


    <!-- CART POPUP -->
    <div
        class="cart-popup"
        id="cartPopup"
    >
        <h2>Shopping Cart</h2>

        <div id="cart-items">
            <p>Your cart is empty</p>
        </div>

        <button
            onclick="closeCart()"
            class="close-cart"
        >
            Close
        </button>
    </div>


    <!-- FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

        import {
            getFirestore,
            collection,
            getDocs,
            addDoc
        } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";


        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "fashion-empire-online.firebaseapp.com",
            projectId: "fashion-empire-online",
            storageBucket: "fashion-empire-online.firebasestorage.app",
            messagingSenderId: "270445447440",
            appId: "1:270445447440:web:17b31b34a0bbecbe87bd95",
            measurementId: "G-PD7G28K99Z"
        };

        /* Firebase initialize only ONCE */

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);


        /* Global access for script.js */

        window.db = db;
        window.collection = collection;
        window.getDocs = getDocs;
        window.addDoc = addDoc;
    </script>


    <!-- MAIN JS -->
    <script src="script.js"></script>

</body>
</html>
